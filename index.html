<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NMTI — 牛马型人格（娱乐向）</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <header class="site-header">
      <span class="logo" id="meta-site-name">NMTI</span>
      <p class="tagline" id="meta-tagline"></p>
    </header>

    <main class="main">
      <section id="screen-welcome" class="screen" aria-labelledby="welcome-title">
        <h1 id="welcome-title" class="title">NMTI</h1>
        <p class="lead" id="welcome-desc"></p>
        <button type="button" class="btn btn-primary" id="btn-start">开始测评</button>
      </section>

      <section id="screen-quiz" class="screen is-hidden" aria-live="polite">
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar" id="quiz-progress-bar"></div>
        </div>
        <p class="progress-text" id="quiz-progress-text"></p>
        <p class="question" id="quiz-prompt"></p>
        <div class="choices" id="quiz-choices" role="group"></div>
        <div class="quiz-actions">
          <button type="button" class="btn btn-ghost" id="btn-prev">上一题</button>
        </div>
      </section>

      <section id="screen-result" class="screen is-hidden" aria-labelledby="result-code">
        <p class="result-label">你的 NMTI</p>
        <h2 class="result-code" id="result-code"></h2>
        <h3 class="result-name" id="result-name"></h3>
        <p class="result-tagline" id="result-tagline"></p>
        <ul class="result-tips" id="result-tips" hidden></ul>
        <button type="button" class="btn btn-primary" id="btn-reset">再测一次</button>
      </section>
    </main>

    <footer class="site-footer">
      <p>娱乐向内容，非科学心理测评；结果仅供自嘲与社交玩梗。</p>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
